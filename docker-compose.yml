services:
  docker-watcher:
    build: .
    image: docker-watcher:latest
    container_name: docker-watcher
    restart: unless-stopped

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config:/config:ro
      - ./logs:/app/logs
      - /deploy/data/aetem/app:/deploy/data/aetem/app  # 추가

    environment:
      - CONFIG_PATH=/config/watcher.yml
      - LOG_DIR=/app/logs

      # PostgreSQL
      - POSTGRES_HOST=10.0.100.130
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=aetemdb
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=postgres123
      
      # RabbitMQ
      - RABBITMQ_ENABLED=true
      - RABBITMQ_HOST=10.0.100.130
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=aistudio
      - RABBITMQ_PASSWORD=aistudio1@#$
      
      # Webhook
      - WEBHOOK_TOKEN=hHRg8U3By8rrTo1Sc3Vwz5E1qwn9XNiuVruLDG6gq9XDMSCKwZ
      - WEBHOOK_DELAY_SECONDS=5
      - WEBHOOK_TIMEOUT=30
      - WEBHOOK_RETRY_COUNT=3

      # Data
      - DATA_ROOT_PATH=/deploy/data/aetem/app

    networks:
      - aetem_v2

    logging:
      driver: json-file
      options:
        max-size: 10mb
        max-file: "3"

networks:
  aetem_v2:
    external: true
