# Docker Watcher 설정

watch:
  images:
    - "nginx:alpine"
    - "test-api:1.0.0"
    - "test-worker:1.0.0"
    - "task-runner:1.0.0"

events:
  include_actions:
    - "create"
    - "start"
    - "stop"
    - "die"
    - "kill"
    - "destroy"
    - "restart"
    - "health_status"
    - "oom"

queues:
  # ── container 모드: Docker 컨테이너 실행 후 종료 대기 ──
  - name: A0001
    analysis_type: opord-preprocess
    mode: service
    service_url: http://opord-preprocess:8100/summarizer

  - name: A0002
    analysis_type: concealment
    mode: container
    image: analysis-concealment:1.0.0
    network: aetem_v2
    volumes:
      - "/deploy/data/aetem/app:/data:ro"