# Docker Watcher 설정

watch:
  images:
    - analysis-convert-data:latest
    - analysis-obstacle:latest
    - analysis-observation-viewshed:latest
    - analysis-cover:latest
    - analysis-observation-direct:latest
    - analysis-observation-throwshed:latest
    - analysis-concealment:latest
    - analysis-costmap:latest
    - analysis-pathfinding:latest
    - analysis-aoa:latest
    - analysis-movement-timeline:latest
    - analysis-hilltop:latest

events:
  include_actions:
    - "create"
    - "start"
    - "stop"
    - "die"
    - "kill"
    - "destroy"
    - "restart"
    - "health_status"
    - "oom"

queues:
  # ── Service 모드 ──────────────────────────────────
  - name: A0001
    analysis_type: opord-preprocess
    mode: service
    service_url: http://opord-preprocess:8100/summarizer

  # B0001 — 가시권분석
  # MQ: { callbackUrl, type, requestId, requestDateTime, observerPositions }
  # 응답: { success, message, requestId, gisTiffPath, cogTiffPath }
  - name: B0001
    mode: container
    analysis_type: "B0001"
    image: "analysis-observation-viewshed"
    timeout: 600
    response_type: "tiff"
    result_filename: "viewshed.tif" # 산출물: 가시권 래스터
    volumes:
      - "/deploy/data/aetem/app/spatial:/mnt/data"
    env_mapping:
      observerPositions: OBSERVER_POSITIONS # 관측자 좌표 [[x,y],...] (EPSG:5186)
      maxDistance: MAX_DISTANCE
    env:
      DEM_PATH: "/mnt/data/pyeongchang/input/convert_data/DEM.tif"

  # B0002 — 사격선분석 (직사)
  # MQ: { callbackUrl, type, requestId, requestDateTime, firePositions, weaponParams }
  # 응답: { success, message, requestId, gisTiffPath, cogTiffPath }
  - name: B0002
    mode: container
    analysis_type: "B0002"
    image: "analysis-observation-direct"
    timeout: 600
    response_type: "tiff"
    result_filename: "direct_fire_viewshed.tif" # 산출물: 사격 가능 영역
    volumes:
      - "/deploy/data/aetem/app/spatial:/mnt/data"
    env_mapping:
      firePositions: FIRE_POSITIONS # 사격 위치 [[x,y],...] (EPSG:5186)
      weaponParams: WEAPON_PARAMS # [최소사거리,최대사거리,최소부각°,최대앙각°,표적높이m]
    env:
      DEM_PATH: "/mnt/data/pyeongchang/input/convert_data/DEM.tif"

  # B0003 — 사격선분석 (곡사)
  # MQ: { callbackUrl, type, requestId, requestDateTime, launch, ballistic }
  # 응답: { success, message, requestId, gisTiffPath, cogTiffPath }
  - name: B0003
    mode: container
    analysis_type: "B0003"
    image: "analysis-observation-throwshed:latest"
    timeout: 600
    response_type: "tiff"
    result_filename: "throwshed_combined_any.tif" # 산출물: 곡사 도달 합집합
    volumes:
      - "/deploy/data/aetem/app/spatial:/mnt/data"
    env_mapping:
      launch: LAUNCH # 발사 위치 [x,y,높이] (EPSG:5186)
      ballistic: BALLISTIC # [초속m/s,중력m/s²,최소발사각°,최대발사각°]
    env:
      DEM_PATH: "/mnt/data/pyeongchang/input/convert_data/DEM.tif"

  # B0004 — 접근로분석
  # MQ: { callbackUrl, type, requestId, requestDateTime, targetPoint, profile, retreatAzimuthDeg }
  # 응답: { success, message, requestId, shapePath }
  - name: B0004
    mode: container
    analysis_type: "B0004"
    image: "analysis-aoa:latest"
    timeout: 600
    response_type: "shape"
    result_filename: "routes_{profile}.zip" # 산출물: 접근로 LineString
    volumes:
      - "/deploy/data/aetem/app/spatial:/mnt/data"
    env_mapping:
      targetPoint: TARGET_POINT # 목표점 [x,y] (EPSG:5186)
      profile: PROFILE # pedestrian/wheeled/tracked
      retreatAzimuthDeg: RETREAT_AZIMUTH_DEG # 아군 방위각 (선택, °)

  # B0005 — 핵심지형분석 (HILLTOP)
  # MQ: { callbackUrl, type, requestId, requestDateTime, userPosition, searchPadius }
  # 응답: { success, message, requestId, shapePath }
  - name: B0005
    mode: container
    analysis_type: "B0005"
    image: "analysis-hilltop"
    timeout: 600
    response_type: "shape"
    result_filename: "best_tophill.zip" # 산출물: 최적 봉우리
    volumes:
      - "/deploy/data/aetem/app/spatial:/mnt/data"
    env_mapping:
      userPosition: USER_POSITION # 사용자 위치 [x,y] (EPSG:5186)
      searchPadius: SEARCH_RADIUS # 탐색 반경 (km) — 명세서 키: searchPadius
    env:
      DEM_PATH: "/mnt/data/pyeongchang/input/convert_data/DEM.tif"

  # B0006 — 장애지형분석
  # MQ: { callbackUrl, type, requestId, requestDateTime, profile }
  # 응답: { success, message, requestId, gisTiffPath, cogTiffPath }
  - name: B0006
    mode: container
    analysis_type: "B0006"
    image: "analysis-obstacle"
    timeout: 600
    response_type: "tiff"
    result_filename: "class_{profile}_barrier.tif" # 산출물: 프로파일별 장벽 분류
    volumes:
      - "/deploy/data/aetem/app/spatial:/mnt/data"
    env_mapping:
      profile: PROFILE # pedestrian/wheeled/tracked
    env:
      DEM_PATH: "/mnt/data/pyeongchang/input/convert_data/DEM.tif"
      RC_RASTER_PATH: "/mnt/data/pyeongchang/input/convert_data/runoff_c.tif"
      CODE_RASTER_PATH: "/mnt/data/pyeongchang/input/convert_data/code_l2_index.tif"
      FOREST_FRTP_PATH: "/mnt/data/pyeongchang/input/convert_data/veg_valid.tif"
      FOREST_DNST_PATH: "/mnt/data/pyeongchang/input/convert_data/s_dnst.tif"
      FOREST_AGCLS_PATH: "/mnt/data/pyeongchang/input/convert_data/s_ag.tif"
      FOREST_DMCLS_PATH: "/mnt/data/pyeongchang/input/convert_data/s_dm.tif"

  # B0007 — 은폐분석
  # MQ: { callbackUrl, type, requestId, requestDateTime }
  # 응답: { success, message, requestId, gisTiffPath, cogTiffPath }
  - name: B0007
    mode: container
    analysis_type: "B0007"
    image: "analysis-concealment"
    timeout: 600
    response_type: "tiff"
    result_filename: "forest_concealment_index.tif" # 산출물: 은폐 지수 (0~1)
    volumes:
      - "/deploy/data/aetem/app/spatial:/mnt/data"
    env_mapping: {} # 추가 환경변수 없음 (DEM/OUTPUT 자동)
    env:
      DEM_PATH: "/mnt/data/pyeongchang/input/convert_data/DEM.tif"
      FOREST_FRTP_SCORE_PATH: "/mnt/data/pyeongchang/input/convert_data/s_frtp.tif"
      FOREST_DNST_PATH: "/mnt/data/pyeongchang/input/convert_data/s_dnst.tif"
      FOREST_AGCLS_PATH: "/mnt/data/pyeongchang/input/convert_data/s_ag.tif"
      FOREST_DMCLS_PATH: "/mnt/data/pyeongchang/input/convert_data/s_dm.tif"

  # B0008 — 엄폐분석
  # MQ: { callbackUrl, type, requestId, requestDateTime, enemyPositions, maxDistance }
  # 응답: { success, message, requestId, gisTiffPath, cogTiffPath }
  - name: B0008
    mode: container
    analysis_type: "B0008"
    image: "analysis-cover:latest"
    timeout: 600
    response_type: "tiff"
    result_filename: "hidden.tif" # 산출물: 엄폐 가능 영역
    volumes:
      - "/deploy/data/aetem/app/spatial:/mnt/data"
    env_mapping:
      enemyPositions: ENEMY_POSITIONS # 적 위치 [[x,y,높이],...] (EPSG:5186)
      maxDistance: MAX_DISTANCE # 최대 가시 거리 (m)

  # B0009 — 진출선분석
  # MQ: { callbackUrl, type, requestId, requestDateTime, start, goal }
  # 응답: { success, message, requestId, shapePath }
  - name: B0009
    mode: container
    analysis_type: "B0009"
    image: "analysis-movement-timeline:latest"
    timeout: 600
    response_type: "shape"
    result_filename: "timeline_segments.zip" # 산출물: 구간별 진출선
    volumes:
      - "/deploy/data/aetem/app/spatial:/mnt/data"
    env_mapping:
      start: START # 출발점 [x,y] (EPSG:5186)
      goal: GOAL # 도착점 [x,y] (EPSG:5186)

  # B0010 — 이동로분석
  # MQ: { callbackUrl, type, requestId, requestDateTime, start, goal, profile }
  # 응답: { success, message, requestId, shapePath }
  - name: B0010
    mode: container
    analysis_type: "B0010"
    image: "analysis-pathfinding"
    timeout: 600
    response_type: "shape"
    result_filename: "path_{profile}.zip" # 산출물: 탐색 경로
    concurrency: 1
    volumes:
      - "/deploy/data/aetem/app/spatial:/mnt/data"
    env_mapping:
      start: START # 출발점 [x,y] (EPSG:5186)
      goal: GOAL # 도착점 [x,y] (EPSG:5186)
      profile: PROFILE # pedestrian/wheeled/tracked
    env:
      DEM_PATH: "/mnt/data/pyeongchang/input/convert_data/DEM.tif"
      COSTMAP_DIR: "/mnt/data/pyeongchang/input/costmap"

  # ============================================================
  # 전처리 (Container 모드)
  # ============================================================

  # B1001 — 데이터 변환
  - name: B1001
    mode: container
    analysis_type: "convert_data"
    image: "analysis-convert-data:latest"
    timeout: 1800
    response_type: "tiff"
    result_filename: "veg_valid.tif"
    volumes:
      - "/deploy/data/aetem/app/spatial:/mnt/data"
    env_mapping:
      baseDataDir: BASE_DATA_DIR # 입력 데이터 루트
      clipAreaShp: CLIP_AREA_SHP # 클립 영역 Shapefile
      forestZipFolder: FOREST_ZIP_FOLDER # 임상도 ZIP 폴더
      landcoverZipFolder: LANDCOVER_ZIP_FOLDER # 토지피복도 ZIP 폴더
      steps: STEPS # 실행 단계 (all/forest/landcover/tif)
    env:
      BASE_PATH: /mnt/data/pyeongchang/input/base_data

  # B1002 — 비용맵 생성
  - name: B1002
    mode: container
    analysis_type: "costmap"
    image: "analysis-costmap:latest"
    timeout: 1200
    response_type: "tiff"
    result_filename: "effective_cost_{profile}_relaxed.tif"
    volumes:
      - "/deploy/data/aetem/app/spatial:/mnt/data"
    env_mapping:
      profile: PROFILE # pedestrian/wheeled/tracked`
